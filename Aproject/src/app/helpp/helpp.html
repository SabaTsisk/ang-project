<div class="help-page">
  <div class="help-header">
    <h1>Help Center</h1>
    <p>What can we help you with today?</p>
  </div>

  <div class="topics-grid">
    @for(topic of topics; track $index){
      <div class="topic-card">
        <span class="topic-icon">{{ topic.icon }}</span>
        <h3>{{ topic.title }}</h3>
        <p>{{ topic.desc }}</p>
      </div>
    }
  </div>

  <div class="help-footer">
    <h2>Still need help?</h2>
    <p>Our support team is available Monday–Friday, 9am–6pm.</p>
    <a routerLink="/contact" class="btn-contact">Contact Us →</a>
  </div>
</div>
